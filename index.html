<!DOCTYPE html>
<html>
<head>
<title>Gamers Paradise</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;
padding-right:10px; /* 🔥 prevents button cut */

/* BACKGROUND */
background-color:#0a0a1f;
background-image:
url("https://www.transparenttextures.com/patterns/asfalt-light.png"),
radial-gradient(circle, rgba(0,255,255,0.08) 3px, transparent 3px),
radial-gradient(circle, rgba(255,0,255,0.08) 3px, transparent 3px);
background-size:180px 180px, 90px 90px, 90px 90px;
}

/* HERO */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
width:100%;

background:linear-gradient(#000000aa,#000000ee),
url('hero section background.png');
background-size:cover;
background-position:center;
}

h1{
font-size:70px;
color:#00ffff;
text-shadow:0 0 40px #00ffff;
}

.tagline{
font-size:24px;
color:#ff00ff;
margin-top:10px;
}

.btn{
margin-top:20px;
padding:15px 30px;
background:#00ffff;
color:black;
border-radius:30px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px #00ffff;
}

/* SECTION */
section{
padding:100px 20px;
text-align:center;
}

h2{
color:#00ffff;
font-size:45px;
}

/* ANIMATION */
.left{
transform:translateX(-120px);
opacity:0;
transition:1s ease;
}

.right{
transform:translateX(120px);
opacity:0;
transition:1s ease;
}

.show{
transform:translateX(0);
opacity:1;
}

/* GRID */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

/* CARD */
.card{
margin:30px;
padding:25px;
border-radius:25px;
width:360px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:relative;
transition:0.4s;
}

.card:hover{
transform:scale(1.08);
}

/* GLOW */
.card::before{
content:'';
position:absolute;
top:-5px;left:-5px;right:-5px;bottom:-5px;
border-radius:25px;
filter:blur(20px);
z-index:-1;
background:linear-gradient(45deg,#00ffff,#ff00ff);
}

/* IMAGE */
.card img{
width:100%;
height:240px;
border-radius:20px;
object-fit:cover;
}

/* GALLERY */
.gallery img{
width:300px;
margin:15px;
border-radius:20px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.1);
}

/* MAP */
iframe{
width:90%;
height:280px;
border-radius:15px;
margin-top:10px;
}

/* 🔥 FINAL BUTTON FIX */
.whatsapp,
.instagram,
.call{
position:fixed;
right:20px;
padding:12px 16px;
border-radius:50px;
color:white;
text-decoration:none;
z-index:9999;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.whatsapp{bottom:20px;background:#25D366;}
.instagram{bottom:85px;background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);}
.call{bottom:150px;background:#007bff;}

</style>
</head>

<body>

<header>
<h1>GAMERS PARADISE</h1>
<div class="tagline">Your Ultimate Playtime Destination</div>
<a href="#games" class="btn">Explore</a>
</header>

<section>
<img src="intro.png" class="left" width="85%">
</section>

<section id="games">
<h2>🎮 Our Games</h2>
<div class="grid">

<div class="card left"><img src="bowling zone.png"><h3>Bowling</h3></div>
<div class="card right"><img src="air hockey.png"><h3>Air Hockey</h3></div>
<div class="card left"><img src="basketball.png"><h3>Basketball</h3></div>
<div class="card right"><img src="bike racing.png"><h3>Bike Racing</h3></div>
<div class="card left"><img src="car racing.png"><h3>Car Racing</h3></div>
<div class="card right"><img src="lucky pong.png"><h3>Lucky Pong</h3></div>
<div class="card left"><img src="vr ak47.png"><h3>VR Shooting</h3></div>
<div class="card right"><img src="vr paraglider.png"><h3>VR Paragliding</h3></div>
<div class="card left"><img src="vr space ride.png"><h3>VR Space Ride</h3></div>

</div>
</section>

<section id="gallery">
<h2>🖼️ Gallery</h2>
<div class="gallery">
<img src="bowling zone.png" class="left">
<img src="air hockey.png" class="right">
<img src="basketball.png" class="left">
<img src="bike racing.png" class="right">
</div>
</section>

<section id="branches">
<h2>📍 Our Branches</h2>

<h3>Topsia</h3>
<iframe src="https://maps.google.com/maps?q=XcaPTSaMiZ1Mw2C46&output=embed"></iframe>

<h3>Metiabruz</h3>
<iframe src="https://maps.google.com/maps?q=YBeHxiDLr5Zj6vfV9&output=embed"></iframe>

<h3>Beck Bagan</h3>
<iframe src="https://maps.google.com/maps?q=i8YhHRoG4k2GTZ6m8&output=embed"></iframe>

<p>📞 <a href="tel:0000000000" style="color:#00aaff;">0000000000</a></p>

</section>

<a class="instagram" href="https://www.instagram.com/gamersparadisekol?igsh=dGMwd2s0dWlpb3J1">Instagram</a>
<a class="whatsapp" href="https://wa.me/910000000000">WhatsApp</a>
<a class="call" href="tel:0000000000">Call</a>

<script>
let elements=document.querySelectorAll('.left, .right');

window.addEventListener('scroll',()=>{
elements.forEach(el=>{
let pos=el.getBoundingClientRect().top;
if(pos<window.innerHeight-100){
el.classList.add('show');
}
});
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Gamers Paradise</title>

<!-- 🔥 IMPORTANT FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
overflow-x:hidden;

/* 🔥 IMPROVED DENSE TEXTURE */
background-color:#0a0a1f;
background-image:
radial-gradient(circle at 20% 20%, rgba(0,255,255,0.06) 2px, transparent 2px),
radial-gradient(circle at 80% 60%, rgba(255,0,255,0.06) 2px, transparent 2px),
radial-gradient(circle at 50% 80%, rgba(255,255,255,0.04) 2px, transparent 2px);
background-size:60px 60px;
}

/* MENU */
.menu-icon{
position:fixed;
top:15px;
right:15px;
font-size:26px;
cursor:pointer;
z-index:1000;
}

/* HERO */
header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(#000000aa,#000000ee),
url('hero section background.png');
background-size:cover;
padding:20px;
}

h1{
font-size:clamp(40px, 8vw, 70px);
color:#00ffff;
text-shadow:0 0 40px #00ffff;
}

.tagline{
font-size:clamp(16px, 4vw, 24px);
color:#ff00ff;
margin-top:10px;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:12px 25px;
background:#00ffff;
color:black;
border-radius:30px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 15px #00ffff;
}

/* SECTION */
section{
padding:70px 15px;
text-align:center;
}

h2{
color:#00ffff;
font-size:clamp(28px,5vw,45px);
}

/* GRID */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

/* CARDS */
.card{
margin:20px;
padding:20px;
border-radius:20px;
width:90%;
max-width:320px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:relative;
}

/* GLOW */
.card::before{
content:'';
position:absolute;
top:-5px;left:-5px;right:-5px;bottom:-5px;
border-radius:20px;
filter:blur(15px);
z-index:-1;
background:linear-gradient(45deg,#00ffff,#ff00ff);
opacity:0.7;
}

/* IMAGE */
.card img{
width:100%;
height:220px;
border-radius:15px;
object-fit:cover;
}

/* FLOAT BUTTON FIX */
.whatsapp,.instagram,.call{
position:fixed;
right:15px;
padding:12px;
border-radius:50px;
color:white;
text-decoration:none;
font-size:14px;
}

.whatsapp{bottom:15px;background:#25D366;}
.instagram{bottom:70px;background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);}
.call{bottom:125px;background:#007bff;}

</style>
</head>

<body>

<header>
<h1>GAMERS PARADISE</h1>
<div class="tagline">Your Ultimate Playtime Destination</div>
<a href="#" class="btn">Explore</a>
</header>

<section>
<div class="grid">
<div class="card"><img src="bowling zone.png"></div>
<div class="card"><img src="air hockey.png"></div>
<div class="card"><img src="basketball.png"></div>
</div>
</section>

<a class="instagram" href="https://www.instagram.com/gamersparadisekol?igsh=dGMwd2s0dWlpb3J1">IG</a>
<a class="whatsapp" href="https://wa.me/910000000000">WA</a>
<a class="call" href="tel:0000000000">Call</a>

</body>
</html>
